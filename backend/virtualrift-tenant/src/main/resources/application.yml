spring:
  application:
    name: virtualrift-tenant

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/virtualrift_tenant}
    username: ${DB_USER:virtualrift}
    password: ${DB_PASSWORD:virtualrift}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration/tenant
    baseline-on-migrate: true
    table: tenant_flyway_schema_history

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

server:
  port: 8082

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

tenant:
  internal:
    api-key: ${TENANT_INTERNAL_API_KEY:virtualrift-dev-onboarding-key}
  repository-credentials:
    encryption-key-base64: ${TENANT_REPOSITORY_CREDENTIALS_KEY_BASE64:MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}
