spring:
  config:
    import:
      - classpath:virtualrift-observability.yml
      - classpath:virtualrift-kafka-security.yml
  application:
    name: virtualrift-tenant

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/virtualrift_tenant}
    username: ${DB_USER:virtualrift_tenant}
    password: ${DB_PASSWORD:virtualrift}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration/tenant
    baseline-on-migrate: true
    table: tenant_flyway_schema_history
    user: ${DB_MIGRATION_USER:virtualrift_tenant_migrator}
    password: ${DB_MIGRATION_PASSWORD:virtualrift}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

server:
  port: 8082

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

management:
  server:
    port: ${MANAGEMENT_PORT:9082}

tenant:
  internal:
    api-key: ${TENANT_INTERNAL_API_KEY:virtualrift-dev-onboarding-key}
  repository-credentials:
  maintenance:
    invitation-cleanup-delay-ms: ${TENANT_INVITATION_CLEANUP_DELAY_MS:3600000}

virtualrift:
  runtime:
    environment: ${VIRTUALRIFT_RUNTIME_ENVIRONMENT:local}
