spring:
  config:
    import: classpath:virtualrift-observability.yml
  application:
    name: virtualrift-auth

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/virtualrift_auth}
    username: ${DB_USER:virtualrift_auth}
    password: ${DB_PASSWORD:virtualrift}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  flyway:
    enabled: true
    locations: classpath:db/migration/auth
    baseline-on-migrate: true
    table: auth_flyway_schema_history
    user: ${DB_MIGRATION_USER:virtualrift_auth_migrator}
    password: ${DB_MIGRATION_PASSWORD:virtualrift}

# JWT Configuration
auth:
  jwt:
    private-key: ${JWT_PRIVATE_KEY}
    public-key: ${JWT_PUBLIC_KEY}
  oauth:
    public-base-url: ${AUTH_PUBLIC_BASE_URL:http://localhost:8080}
    state-secret: ${AUTH_OAUTH_STATE_SECRET:}
    state-ttl-seconds: ${AUTH_OAUTH_STATE_TTL_SECONDS:300}
    allowed-redirect-origins:
      - ${AUTH_OAUTH_ALLOWED_REDIRECT_ORIGIN_LOCALHOST:http://localhost:5173}
      - ${AUTH_OAUTH_ALLOWED_REDIRECT_ORIGIN_LOOPBACK:http://127.0.0.1:5173}
    auto-provision:
      enabled: ${AUTH_OAUTH_AUTO_PROVISION_ENABLED:false}
      tenant-id: ${AUTH_OAUTH_AUTO_PROVISION_TENANT_ID:}
      roles: ${AUTH_OAUTH_AUTO_PROVISION_ROLES:READER}
    github:
      enabled: ${AUTH_GITHUB_OAUTH_ENABLED:false}
      client-id: ${AUTH_GITHUB_CLIENT_ID:}
      client-secret: ${AUTH_GITHUB_CLIENT_SECRET:}
      authorize-url: ${AUTH_GITHUB_AUTHORIZE_URL:https://github.com/login/oauth/authorize}
      token-url: ${AUTH_GITHUB_TOKEN_URL:https://github.com/login/oauth/access_token}
      user-url: ${AUTH_GITHUB_USER_URL:https://api.github.com/user}
      emails-url: ${AUTH_GITHUB_EMAILS_URL:https://api.github.com/user/emails}
      scope: ${AUTH_GITHUB_SCOPE:read:user user:email}
  onboarding:
    enabled: ${AUTH_ONBOARDING_ENABLED:true}
    allowed-plans: ${AUTH_ONBOARDING_ALLOWED_PLANS:TRIAL,STARTER,PROFESSIONAL}
    tenant-service-url: ${TENANT_SERVICE_URL:http://localhost:8082}
    internal-api-key: ${TENANT_INTERNAL_API_KEY:virtualrift-dev-onboarding-key}
  maintenance:
    refresh-token-cleanup-delay-ms: ${AUTH_REFRESH_TOKEN_CLEANUP_DELAY_MS:3600000}

virtualrift:
  runtime:
    environment: ${VIRTUALRIFT_RUNTIME_ENVIRONMENT:local}

# Server configuration
server:
  port: 8081

management:
  server:
    port: ${MANAGEMENT_PORT:9081}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
