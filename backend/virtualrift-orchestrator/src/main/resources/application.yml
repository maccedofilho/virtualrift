spring:
  config:
    import:
      - classpath:virtualrift-observability.yml
      - classpath:virtualrift-kafka-security.yml
  application:
    name: virtualrift-orchestrator

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/virtualrift_orchestrator}
    username: ${DB_USER:virtualrift_orchestrator}
    password: ${DB_PASSWORD:virtualrift}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration/orchestrator
    baseline-on-migrate: true
    table: orchestrator_flyway_schema_history
    user: ${DB_MIGRATION_USER:virtualrift_orchestrator_migrator}
    password: ${DB_MIGRATION_PASSWORD:virtualrift}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.virtualrift.common.events

tenant:
  service:
    url: ${TENANT_SERVICE_URL:http://localhost:8082}
  internal:
    api-key: ${TENANT_INTERNAL_API_KEY:virtualrift-dev-onboarding-key}

outbox:
  publisher:
    fixed-delay-ms: ${OUTBOX_PUBLISHER_DELAY_MS:1000}
    batch-size: ${OUTBOX_PUBLISHER_BATCH_SIZE:25}
    send-timeout-seconds: ${OUTBOX_SEND_TIMEOUT_SECONDS:10}

virtualrift:
  runtime:
    environment: ${VIRTUALRIFT_RUNTIME_ENVIRONMENT:local}

server:
  port: 8083

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

management:
  server:
    port: ${MANAGEMENT_PORT:9083}
