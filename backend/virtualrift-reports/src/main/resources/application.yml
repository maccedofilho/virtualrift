spring:
  config:
    import:
      - classpath:virtualrift-observability.yml
      - classpath:virtualrift-kafka-security.yml
  application:
    name: virtualrift-reports

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/virtualrift_reports}
    username: ${DB_USER:virtualrift}
    password: ${DB_PASSWORD:virtualrift}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration/reports
    baseline-on-migrate: true
    table: reports_flyway_schema_history

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

orchestrator:
  service:
    url: ${ORCHESTRATOR_SERVICE_URL:http://localhost:8083}

virtualrift:
  runtime:
    environment: ${VIRTUALRIFT_RUNTIME_ENVIRONMENT:local}

server:
  port: 8084

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

management:
  server:
    port: ${MANAGEMENT_PORT:9084}
