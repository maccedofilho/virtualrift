name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository-hygiene:
    name: Repository hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Check committed whitespace
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git diff --check "origin/${{ github.base_ref }}...HEAD"
          else
            git diff-tree --check --no-commit-id --root -r HEAD
          fi

      - name: Reject backup files
        run: |
          if find . -type f \( -name '*.bak' -o -name '*.tmp' -o -name '*.orig' -o -name '*~' \) | grep -q .; then
            find . -type f \( -name '*.bak' -o -name '*.tmp' -o -name '*.orig' -o -name '*~' \)
            exit 1
          fi

      - name: Require immutable action references
        run: |
          if rg --pcre2 '^\s*uses:\s*(?!\./)[^@\s]+@(?![0-9a-f]{40}(?:\s|$))\S+' .github/workflows; then
            echo "Every external GitHub Action must be pinned to a full commit SHA." >&2
            exit 1
          fi

  delivery-configuration:
    name: Delivery configuration
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: repository-hygiene
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate GitHub Actions workflows
        run: >-
          docker run --rm -v "$PWD:/repo" --workdir /repo
          rhysd/actionlint:1.7.7@sha256:887a259a5a534f3c4f36cb02dca341673c6089431057242cdc931e9f133147e9

      - name: Validate release scripts
        run: |
          bash -n infra/scripts/*.sh
          docker run --rm -v "$PWD:/repo" --workdir /repo \
            koalaman/shellcheck-alpine:v0.10.0@sha256:5921d946dac740cbeec2fb1c898747b6105e585130cc7f0602eec9a10f7ddb63 \
            shellcheck --external-sources --source-path=infra/scripts \
            infra/scripts/deploy-release.sh \
            infra/scripts/rollback-release.sh \
            infra/scripts/smoke-test-release.sh \
            infra/scripts/verify-release-images.sh

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4

      - name: Validate Helm environments
        run: |
          for environment in dev staging production; do
            helm lint infra/helm/virtualrift \
              -f infra/helm/virtualrift/values.yaml \
              -f "infra/helm/virtualrift/values-$environment.yaml"
            helm template virtualrift infra/helm/virtualrift \
              -f infra/helm/virtualrift/values.yaml \
              -f "infra/helm/virtualrift/values-$environment.yaml" \
              | docker run --rm -i \
                  ghcr.io/yannh/kubeconform:v0.6.7@sha256:0925177fb05b44ce18574076141b5c3d83235e1904d3f952182ac99ddc45762c \
                  -strict -summary -ignore-missing-schemas -kubernetes-version 1.29.0
          done

          helm template virtualrift infra/helm/virtualrift \
            -f infra/helm/virtualrift/values.yaml \
            -f infra/helm/virtualrift/values-dev.yaml > /tmp/virtualrift-dev.yaml
          if grep -qE 'kind: ExternalSecret|name: KAFKA_SASL_JAAS_CONFIG' /tmp/virtualrift-dev.yaml; then
            echo "Development must not render managed Secrets or Kafka credentials." >&2
            exit 1
          fi

          helm template virtualrift infra/helm/virtualrift \
            -f infra/helm/virtualrift/values.yaml \
            -f infra/helm/virtualrift/values-production.yaml > /tmp/virtualrift-production.yaml
          test "$(grep -c 'kind: ExternalSecret' /tmp/virtualrift-production.yaml)" -eq 9
          grep -q 'name: KAFKA_SECURITY_PROTOCOL' /tmp/virtualrift-production.yaml
          grep -q 'value: "SASL_SSL"' /tmp/virtualrift-production.yaml
          grep -q 'name: KAFKA_SASL_JAAS_CONFIG' /tmp/virtualrift-production.yaml

          helm template virtualrift infra/helm/virtualrift \
            -f infra/helm/virtualrift/values.yaml \
            -f infra/helm/virtualrift/values-production.yaml \
            --set observability.serviceMonitor.enabled=true \
            --set observability.prometheusRule.enabled=true \
            --set observability.grafanaDashboard.enabled=true \
            | docker run --rm -i \
                ghcr.io/yannh/kubeconform:v0.6.7@sha256:0925177fb05b44ce18574076141b5c3d83235e1904d3f952182ac99ddc45762c \
                -strict -summary -ignore-missing-schemas -kubernetes-version 1.29.0

  backend:
    name: Backend tests and package
    runs-on: ubuntu-latest
    timeout-minutes: 35
    needs: repository-hygiene
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run backend tests
        working-directory: backend
        env:
          DOCKER_API_VERSION: "1.44"
        run: mvn -B -ntp test

      - name: Package backend
        working-directory: backend
        run: mvn -B -ntp package -DskipTests

  frontend:
    name: Frontend tests, lint and build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: repository-hygiene
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.33.0 --activate

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Run frontend tests
        working-directory: frontend
        run: pnpm test

      - name: Run frontend lint
        working-directory: frontend
        run: pnpm lint

      - name: Build frontend
        working-directory: frontend
        run: pnpm build
