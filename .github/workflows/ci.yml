name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository-hygiene:
    name: Repository hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check committed whitespace
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git diff --check "origin/${{ github.base_ref }}...HEAD"
          else
            git diff-tree --check --no-commit-id --root -r HEAD
          fi

      - name: Reject backup files
        run: |
          if find . -type f \( -name '*.bak' -o -name '*.tmp' -o -name '*.orig' -o -name '*~' \) | grep -q .; then
            find . -type f \( -name '*.bak' -o -name '*.tmp' -o -name '*.orig' -o -name '*~' \)
            exit 1
          fi

  backend:
    name: Backend tests and package
    runs-on: ubuntu-latest
    timeout-minutes: 35
    needs: repository-hygiene
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run backend tests
        working-directory: backend
        env:
          DOCKER_API_VERSION: "1.44"
        run: mvn -B -ntp test

      - name: Package backend
        working-directory: backend
        run: mvn -B -ntp package -DskipTests

  frontend:
    name: Frontend tests, lint and build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: repository-hygiene
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.33.0 --activate

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Run frontend tests
        working-directory: frontend
        run: pnpm test

      - name: Run frontend lint
        working-directory: frontend
        run: pnpm lint

      - name: Build frontend
        working-directory: frontend
        run: pnpm build
