name: Deploy

on:
  workflow_run:
    workflows:
      - Container images
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: Environment that will receive the release
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
      image_sha:
        description: Full commit SHA published by the container image workflow
        required: true
        type: string

permissions:
  contents: read
  id-token: write
  packages: read

concurrency:
  group: deploy-${{ github.event_name == 'workflow_run' && 'staging' || inputs.environment }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to ${{ github.event_name == 'workflow_run' && 'staging' || inputs.environment }}
    if: >-
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment:
      name: ${{ github.event_name == 'workflow_run' && 'staging' || inputs.environment }}
      url: ${{ vars.FRONTEND_URL }}
    env:
      DEPLOY_ENVIRONMENT: ${{ github.event_name == 'workflow_run' && 'staging' || inputs.environment }}
      IMAGE_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || inputs.image_sha }}
      KUBERNETES_NAMESPACE: ${{ vars.KUBERNETES_NAMESPACE }}
      HELM_RELEASE_NAME: ${{ vars.HELM_RELEASE_NAME }}
      API_HEALTH_URL: ${{ vars.API_HEALTH_URL }}
      FRONTEND_HEALTH_URL: ${{ vars.FRONTEND_HEALTH_URL }}
    steps:
      - name: Checkout trusted deployment source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.event.repository.default_branch }}

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify immutable release images
        run: ./infra/scripts/verify-release-images.sh "$IMAGE_SHA"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Configure GKE credentials
        uses: google-github-actions/get-gke-credentials@64bc7249bbcf78056bb92f14d3cedc2da193946c # v2
        with:
          cluster_name: ${{ vars.GKE_CLUSTER_NAME }}
          location: ${{ vars.GKE_LOCATION }}
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@776406bce94f63e41d621b960d78ee25c8b76ede # v4

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4

      - name: Deploy immutable release
        id: deploy
        run: ./infra/scripts/deploy-release.sh "$DEPLOY_ENVIRONMENT" "$IMAGE_SHA"

      - name: Run external smoke tests
        id: smoke
        continue-on-error: true
        run: ./infra/scripts/smoke-test-release.sh "$API_HEALTH_URL" "$FRONTEND_HEALTH_URL"

      - name: Recover previous release after smoke test failure
        if: steps.smoke.outcome == 'failure'
        env:
          PREVIOUS_REVISION: ${{ steps.deploy.outputs.previous_revision }}
        run: |
          if [[ -n "$PREVIOUS_REVISION" ]]; then
            ./infra/scripts/rollback-release.sh "$DEPLOY_ENVIRONMENT" "$PREVIOUS_REVISION"
          else
            release_name=${HELM_RELEASE_NAME:-virtualrift}
            namespace=${KUBERNETES_NAMESPACE:-virtualrift-$DEPLOY_ENVIRONMENT}
            helm uninstall "$release_name" --namespace "$namespace" --wait --timeout 15m
          fi

      - name: Fail deployment after recovery
        if: steps.smoke.outcome == 'failure'
        run: |
          echo "Smoke tests failed and the previous state was restored." >&2
          exit 1

      - name: Publish deployment summary
        if: always()
        env:
          IMAGE_TAG: ${{ steps.deploy.outputs.image_tag }}
          RELEASE_NAMESPACE: ${{ steps.deploy.outputs.namespace }}
          RELEASE_NAME: ${{ steps.deploy.outputs.release_name }}
          SMOKE_OUTCOME: ${{ steps.smoke.outcome }}
        run: |
          {
            echo "## VirtualRift deployment"
            echo
            echo "- Environment: \`$DEPLOY_ENVIRONMENT\`"
            echo "- Image tag: \`${IMAGE_TAG:-not-deployed}\`"
            echo "- Release: \`${RELEASE_NAME:-not-deployed}\`"
            echo "- Namespace: \`${RELEASE_NAMESPACE:-not-deployed}\`"
            echo "- Smoke tests: \`${SMOKE_OUTCOME:-not-run}\`"
          } >>"$GITHUB_STEP_SUMMARY"
