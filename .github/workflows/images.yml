name: Container images

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  attestations: write
  contents: read
  id-token: write
  packages: write

concurrency:
  group: images-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/maccedofilho/virtualrift
  TRIVY_IMAGE: aquasec/trivy:0.70.0@sha256:be1190afcb28352bfddc4ddeb71470835d16462af68d310f9f4bca710961a41e

jobs:
  backend-images:
    name: Backend image (${{ matrix.service }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: gateway
            module: virtualrift-gateway
            port: 8080
          - service: auth
            module: virtualrift-auth
            port: 8081
          - service: tenant
            module: virtualrift-tenant
            port: 8082
          - service: orchestrator
            module: virtualrift-orchestrator
            port: 8083
          - service: reports
            module: virtualrift-reports
            port: 8084
          - service: web-scanner
            module: virtualrift-web-scanner
            port: 8085
          - service: api-scanner
            module: virtualrift-api-scanner
            port: 8086
          - service: network-scanner
            module: virtualrift-network-scanner
            port: 8087
          - service: sast
            module: virtualrift-sast
            port: 8088
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: metadata
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=sha,format=long,prefix=sha-
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=tag

      - name: Build and optionally publish image
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: backend
          file: backend/Dockerfile
          build-args: |
            SERVICE_MODULE=${{ matrix.module }}
            SERVICE_PORT=${{ matrix.port }}
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha,scope=backend-${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=backend-${{ matrix.service }}
          provenance: ${{ github.event_name != 'pull_request' }}
          sbom: ${{ github.event_name != 'pull_request' }}

      - name: Scan pull request image
        if: github.event_name == 'pull_request'
        env:
          IMAGE_TAGS: ${{ steps.metadata.outputs.tags }}
        run: |
          image_ref=$(sed -n '1p' <<<"$IMAGE_TAGS")
          test -n "$image_ref"
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            "$TRIVY_IMAGE" image \
            --scanners vuln \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 1 \
            --skip-version-check \
            "$image_ref"

      - name: Scan published image digest
        if: github.event_name != 'pull_request'
        env:
          IMAGE: ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: >-
          docker run --rm
          -v "$HOME/.docker/config.json:/root/.docker/config.json:ro"
          "$TRIVY_IMAGE" image
          --scanners vuln
          --severity HIGH,CRITICAL
          --ignore-unfixed
          --exit-code 1
          --skip-version-check
          "$IMAGE@$DIGEST"

      - name: Attest published image provenance
        if: github.event_name != 'pull_request'
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-name: ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Verify published image attestation
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE: ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: gh attestation verify "oci://$IMAGE@$DIGEST" --repo "$GITHUB_REPOSITORY"

  frontend-image:
    name: Frontend image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: metadata
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.IMAGE_PREFIX }}-frontend
          tags: |
            type=sha,format=long,prefix=sha-
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=tag

      - name: Build and optionally publish image
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: frontend
          file: frontend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
          provenance: ${{ github.event_name != 'pull_request' }}
          sbom: ${{ github.event_name != 'pull_request' }}

      - name: Scan pull request image
        if: github.event_name == 'pull_request'
        env:
          IMAGE_TAGS: ${{ steps.metadata.outputs.tags }}
        run: |
          image_ref=$(sed -n '1p' <<<"$IMAGE_TAGS")
          test -n "$image_ref"
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            "$TRIVY_IMAGE" image \
            --scanners vuln \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 1 \
            --skip-version-check \
            "$image_ref"

      - name: Scan published image digest
        if: github.event_name != 'pull_request'
        env:
          IMAGE: ${{ env.IMAGE_PREFIX }}-frontend
          DIGEST: ${{ steps.build.outputs.digest }}
        run: >-
          docker run --rm
          -v "$HOME/.docker/config.json:/root/.docker/config.json:ro"
          "$TRIVY_IMAGE" image
          --scanners vuln
          --severity HIGH,CRITICAL
          --ignore-unfixed
          --exit-code 1
          --skip-version-check
          "$IMAGE@$DIGEST"

      - name: Attest published image provenance
        if: github.event_name != 'pull_request'
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-name: ${{ env.IMAGE_PREFIX }}-frontend
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Verify published image attestation
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE: ${{ env.IMAGE_PREFIX }}-frontend
          DIGEST: ${{ steps.build.outputs.digest }}
        run: gh attestation verify "oci://$IMAGE@$DIGEST" --repo "$GITHUB_REPOSITORY"
