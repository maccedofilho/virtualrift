version: 2

updates:
  - package-ecosystem: maven
    directory: /backend
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 5
    groups:
      maven-routine:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: "06:15"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 5
    groups:
      frontend-routine:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: docker
    directories:
      - /backend
      - /frontend
    schedule:
      interval: weekly
      day: monday
      time: "06:30"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 5
    groups:
      container-routine:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: terraform
    directories:
      - /infra/terraform/environments/dev
      - /infra/terraform/environments/staging
      - /infra/terraform/environments/production
    schedule:
      interval: weekly
      day: monday
      time: "06:45"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 5
    groups:
      terraform-routine:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 5
    groups:
      actions-routine:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
