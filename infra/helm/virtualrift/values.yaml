global:
  env:
    VIRTUALRIFT_RUNTIME_ENVIRONMENT: development
  service:
    type: ClusterIP
  serviceAccount:
    create: true
    name: ""
    annotations: {}
  imagePullSecrets: []
  automountServiceAccountToken: false
  enableServiceLinks: false
  terminationGracePeriodSeconds: 35
  preStopDelaySeconds: 5
  tmpVolume:
    sizeLimit: 1Gi
  deployment:
    minReadySeconds: 10
    progressDeadlineSeconds: 600
    strategy:
      type: RollingUpdate
      rollingUpdate:
        maxUnavailable: 0
        maxSurge: 1
  autoscaling:
    behavior:
      scaleUp:
        stabilizationWindowSeconds: 0
        policies:
          - type: Percent
            value: 100
            periodSeconds: 60
          - type: Pods
            value: 2
            periodSeconds: 60
        selectPolicy: Max
      scaleDown:
        stabilizationWindowSeconds: 300
        policies:
          - type: Percent
            value: 25
            periodSeconds: 60
        selectPolicy: Max
  topologySpread:
    enabled: true
    maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway
  podLabels: {}
  podAnnotations: {}
  podSecurityContext:
    fsGroup: 10001
  containerSecurityContext:
    runAsNonRoot: true
    runAsUser: 10001
    runAsGroup: 10001
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
  nodeSelector: {}
  tolerations: []
  affinity: {}
  ingress:
    className: nginx
    annotations: {}

observability:
  runbookBaseUrl: https://github.com/maccedofilho/virtualrift/blob/main/infra/runbooks
  metrics:
    enabled: true
    path: /actuator/prometheus
    ports:
      gateway: 9080
      auth: 9081
      tenant: 9082
      orchestrator: 9083
      reports: 9084
      web-scanner: 9085
      api-scanner: 9086
      network-scanner: 9087
      sast: 9088
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    labels: {}
  prometheusRule:
    enabled: false
    labels: {}
  grafanaDashboard:
    enabled: false
    labels:
      grafana_dashboard: "1"

networkPolicy:
  enabled: false
  ingress:
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: ingress-nginx
    podSelector:
      matchLabels:
        app.kubernetes.io/name: ingress-nginx
  monitoring:
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: monitoring
  dns:
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: kube-system
    podSelector:
      matchLabels:
        k8s-app: kube-dns
  dependencyPorts:
    - 5432
    - 6379
    - 9092

externalSecrets:
  enabled: false
  refreshInterval: 1h
  remotePathPrefix: development
  secretStoreRef:
    kind: SecretStore
    name: virtualrift-vault
  secretStore:
    create: false
    vault:
      server: https://vault.virtualrift.example.com
      namespace: ""
      path: virtualrift
      version: v2
      auth:
        mountPath: kubernetes
        role: virtualrift-development
        audiences:
          - vault
  target:
    creationPolicy: Owner
    deletionPolicy: Retain
  secrets:
    jwt:
      targetName: virtualrift-jwt
      remoteKey: jwt
    shared:
      targetName: virtualrift-shared-secrets
      remoteKey: shared-secrets
    authDb:
      targetName: virtualrift-auth-db
      remoteKey: auth-db
    auth:
      targetName: virtualrift-auth-secrets
      remoteKey: auth-secrets
    tenantDb:
      targetName: virtualrift-tenant-db
      remoteKey: tenant-db
    tenant:
      targetName: virtualrift-tenant-secrets
      remoteKey: tenant-secrets
    orchestratorDb:
      targetName: virtualrift-orchestrator-db
      remoteKey: orchestrator-db
    reportsDb:
      targetName: virtualrift-reports-db
      remoteKey: reports-db
    kafkaClient:
      targetName: virtualrift-kafka-client
      remoteKey: kafka-client

platform:
  publicApiUrl: https://api.virtualrift.example.com
  frontendOrigin: https://app.virtualrift.example.com
  githubOauthEnabled: "false"

dependencies:
  postgres:
    host: postgres.internal
    port: 5432
  redis:
    host: redis.internal
    port: 6379
  kafka:
    bootstrapServers: kafka.internal:9092
    security:
      enabled: false
      protocol: SASL_SSL
      saslMechanism: SCRAM-SHA-512
      endpointIdentificationAlgorithm: https
      secretName: virtualrift-kafka-client
      jaasConfigKey: sasl-jaas-config
      caCertificatesKey: ca.crt

components:
  gateway:
    enabled: true
    replicas: 2
    image:
      repository: ghcr.io/maccedofilho/virtualrift-gateway
      tag: edge
      pullPolicy: Always
    service:
      port: 8080
      targetPort: 8080
    ingress:
      enabled: true
      host: api.virtualrift.example.com
      path: /
      pathType: Prefix
      tls: true
      tlsSecretName: virtualrift-api-tls
      annotations: {}
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 6
      targetCPUUtilizationPercentage: 70
    podDisruptionBudget:
      enabled: true
      minAvailable: 1
    probes:
      startup:
        enabled: true
        type: http
        path: /actuator/health/liveness
        port: 9080
        periodSeconds: 5
        failureThreshold: 30
      liveness:
        enabled: true
        type: http
        path: /actuator/health/liveness
        port: 9080
      readiness:
        enabled: true
        type: http
        path: /actuator/health
        port: 9080
    env:
      AUTH_SERVICE_URL: '{{ printf "http://%s:%d" (include "virtualrift.componentFullname" (dict "root" $ "name" "auth")) 8081 }}'
      TENANT_SERVICE_URL: '{{ printf "http://%s:%d" (include "virtualrift.componentFullname" (dict "root" $ "name" "tenant")) 8082 }}'
      ORCHESTRATOR_SERVICE_URL: '{{ printf "http://%s:%d" (include "virtualrift.componentFullname" (dict "root" $ "name" "orchestrator")) 8083 }}'
      REPORTS_SERVICE_URL: '{{ printf "http://%s:%d" (include "virtualrift.componentFullname" (dict "root" $ "name" "reports")) 8084 }}'
      WEB_SCANNER_URL: '{{ printf "http://%s:%d" (include "virtualrift.componentFullname" (dict "root" $ "name" "web-scanner")) 8085 }}'
      API_SCANNER_URL: '{{ printf "http://%s:%d" (include "virtualrift.componentFullname" (dict "root" $ "name" "api-scanner")) 8086 }}'
      NETWORK_SCANNER_URL: '{{ printf "http://%s:%d" (include "virtualrift.componentFullname" (dict "root" $ "name" "network-scanner")) 8087 }}'
      SAST_SERVICE_URL: '{{ printf "http://%s:%d" (include "virtualrift.componentFullname" (dict "root" $ "name" "sast")) 8088 }}'
      REDIS_HOST: '{{ .Values.dependencies.redis.host }}'
      REDIS_PORT: '{{ .Values.dependencies.redis.port }}'
      GATEWAY_ALLOWED_ORIGIN_LOCALHOST: '{{ .Values.platform.frontendOrigin }}'
      GATEWAY_ALLOWED_ORIGIN_LOOPBACK: '{{ .Values.platform.frontendOrigin }}'
    secretEnv:
      JWT_PUBLIC_KEY:
        secretName: virtualrift-jwt
        key: public-key.pem
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi

  auth:
    enabled: true
    replicas: 2
    image:
      repository: ghcr.io/maccedofilho/virtualrift-auth
      tag: edge
      pullPolicy: Always
    service:
      port: 8081
      targetPort: 8081
    ingress:
      enabled: false
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 5
      targetCPUUtilizationPercentage: 70
    podDisruptionBudget:
      enabled: true
      minAvailable: 1
    probes:
      startup:
        enabled: true
        type: http
        path: /actuator/health/liveness
        port: 9081
        periodSeconds: 5
        failureThreshold: 30
      liveness:
        enabled: true
        type: http
        path: /actuator/health/liveness
        port: 9081
      readiness:
        enabled: true
        type: http
        path: /actuator/health
        port: 9081
    env:
      DB_URL: 'jdbc:postgresql://{{ .Values.dependencies.postgres.host }}:{{ .Values.dependencies.postgres.port }}/virtualrift_auth'
      DB_USER: virtualrift_auth
      REDIS_HOST: '{{ .Values.dependencies.redis.host }}'
      REDIS_PORT: '{{ .Values.dependencies.redis.port }}'
      AUTH_PUBLIC_BASE_URL: '{{ .Values.platform.publicApiUrl }}'
      AUTH_OAUTH_ALLOWED_REDIRECT_ORIGIN_LOCALHOST: '{{ .Values.platform.frontendOrigin }}'
      AUTH_OAUTH_ALLOWED_REDIRECT_ORIGIN_LOOPBACK: '{{ .Values.platform.frontendOrigin }}'
      AUTH_GITHUB_OAUTH_ENABLED: '{{ .Values.platform.githubOauthEnabled }}'
      AUTH_ONBOARDING_ENABLED: "true"
      AUTH_ONBOARDING_ALLOWED_PLANS: TRIAL,STARTER,PROFESSIONAL
      TENANT_SERVICE_URL: '{{ printf "http://%s:%d" (include "virtualrift.componentFullname" (dict "root" $ "name" "tenant")) 8082 }}'
    secretEnv:
      DB_PASSWORD:
        secretName: virtualrift-auth-db
        key: password
      JWT_PRIVATE_KEY:
        secretName: virtualrift-jwt
        key: private-key.pem
      JWT_PUBLIC_KEY:
        secretName: virtualrift-jwt
        key: public-key.pem
      AUTH_OAUTH_STATE_SECRET:
        secretName: virtualrift-auth-secrets
        key: oauth-state-secret
      AUTH_GITHUB_CLIENT_ID:
        secretName: virtualrift-auth-secrets
        key: github-client-id
        optional: true
      AUTH_GITHUB_CLIENT_SECRET:
        secretName: virtualrift-auth-secrets
        key: github-client-secret
        optional: true
      TENANT_INTERNAL_API_KEY:
        secretName: virtualrift-shared-secrets
        key: tenant-internal-api-key
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi

  tenant:
    enabled: true
    kafka: true
    replicas: 2
    image:
      repository: ghcr.io/maccedofilho/virtualrift-tenant
      tag: edge
      pullPolicy: Always
    service:
      port: 8082
      targetPort: 8082
    ingress:
      enabled: false
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 5
      targetCPUUtilizationPercentage: 70
    podDisruptionBudget:
      enabled: true
      minAvailable: 1
    probes:
      startup:
        enabled: true
        type: http
        path: /actuator/health/liveness
        port: 9082
        periodSeconds: 5
        failureThreshold: 30
      liveness:
        enabled: true
        type: http
        path: /actuator/health/liveness
        port: 9082
      readiness:
        enabled: true
        type: http
        path: /actuator/health
        port: 9082
    env:
      DB_URL: 'jdbc:postgresql://{{ .Values.dependencies.postgres.host }}:{{ .Values.dependencies.postgres.port }}/virtualrift_tenant'
      DB_USER: virtualrift_tenant
      KAFKA_BOOTSTRAP_SERVERS: '{{ .Values.dependencies.kafka.bootstrapServers }}'
    secretEnv:
      DB_PASSWORD:
        secretName: virtualrift-tenant-db
        key: password
      TENANT_INTERNAL_API_KEY:
        secretName: virtualrift-shared-secrets
        key: tenant-internal-api-key
      TENANT_REPOSITORY_CREDENTIALS_KEY_BASE64:
        secretName: virtualrift-tenant-secrets
        key: repository-credentials-key-base64
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi

  orchestrator:
    enabled: true
    kafka: true
    replicas: 2
    image:
      repository: ghcr.io/maccedofilho/virtualrift-orchestrator
      tag: edge
      pullPolicy: Always
    service:
      port: 8083
      targetPort: 8083
    ingress:
      enabled: false
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 5
      targetCPUUtilizationPercentage: 70
    podDisruptionBudget:
      enabled: true
      minAvailable: 1
    probes:
      startup:
        enabled: true
        type: http
        path: /actuator/health/liveness
        port: 9083
        periodSeconds: 5
        failureThreshold: 30
      liveness:
        enabled: true
        type: http
        path: /actuator/health/liveness
        port: 9083
      readiness:
        enabled: true
        type: http
        path: /actuator/health
        port: 9083
    env:
      DB_URL: 'jdbc:postgresql://{{ .Values.dependencies.postgres.host }}:{{ .Values.dependencies.postgres.port }}/virtualrift_orchestrator'
      DB_USER: virtualrift_orchestrator
      KAFKA_BOOTSTRAP_SERVERS: '{{ .Values.dependencies.kafka.bootstrapServers }}'
      TENANT_SERVICE_URL: '{{ printf "http://%s:%d" (include "virtualrift.componentFullname" (dict "root" $ "name" "tenant")) 8082 }}'
    secretEnv:
      DB_PASSWORD:
        secretName: virtualrift-orchestrator-db
        key: password
      TENANT_INTERNAL_API_KEY:
        secretName: virtualrift-shared-secrets
        key: tenant-internal-api-key
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi

  reports:
    enabled: true
    kafka: true
    replicas: 2
    image:
      repository: ghcr.io/maccedofilho/virtualrift-reports
      tag: edge
      pullPolicy: Always
    service:
      port: 8084
      targetPort: 8084
    ingress:
      enabled: false
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 4
      targetCPUUtilizationPercentage: 70
    podDisruptionBudget:
      enabled: true
      minAvailable: 1
    probes:
      startup:
        enabled: true
        type: http
        path: /actuator/health/liveness
        port: 9084
        periodSeconds: 5
        failureThreshold: 30
      liveness:
        enabled: true
        type: http
        path: /actuator/health/liveness
        port: 9084
      readiness:
        enabled: true
        type: http
        path: /actuator/health
        port: 9084
    env:
      DB_URL: 'jdbc:postgresql://{{ .Values.dependencies.postgres.host }}:{{ .Values.dependencies.postgres.port }}/virtualrift_reports'
      DB_USER: virtualrift_reports
      KAFKA_BOOTSTRAP_SERVERS: '{{ .Values.dependencies.kafka.bootstrapServers }}'
      ORCHESTRATOR_SERVICE_URL: '{{ printf "http://%s:%d" (include "virtualrift.componentFullname" (dict "root" $ "name" "orchestrator")) 8083 }}'
    secretEnv:
      DB_PASSWORD:
        secretName: virtualrift-reports-db
        key: password
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi

  web-scanner:
    enabled: true
    kafka: true
    replicas: 1
    image:
      repository: ghcr.io/maccedofilho/virtualrift-web-scanner
      tag: edge
      pullPolicy: Always
    service:
      port: 8085
      targetPort: 8085
    ingress:
      enabled: false
    autoscaling:
      enabled: true
      minReplicas: 1
      maxReplicas: 4
      targetCPUUtilizationPercentage: 70
    podDisruptionBudget:
      enabled: false
    probes:
      startup:
        enabled: true
        type: http
        path: /actuator/health/liveness
        port: 9085
        periodSeconds: 5
        failureThreshold: 30
      liveness:
        enabled: true
        type: http
        path: /actuator/health/liveness
        port: 9085
      readiness:
        enabled: true
        type: http
        path: /actuator/health
        port: 9085
    env:
      KAFKA_BOOTSTRAP_SERVERS: '{{ .Values.dependencies.kafka.bootstrapServers }}'
    resources:
      requests:
        cpu: 150m
        memory: 256Mi
      limits:
        cpu: 750m
        memory: 768Mi

  api-scanner:
    enabled: true
    kafka: true
    replicas: 1
    image:
      repository: ghcr.io/maccedofilho/virtualrift-api-scanner
      tag: edge
      pullPolicy: Always
    service:
      port: 8086
      targetPort: 8086
    ingress:
      enabled: false
    autoscaling:
      enabled: true
      minReplicas: 1
      maxReplicas: 4
      targetCPUUtilizationPercentage: 70
    podDisruptionBudget:
      enabled: false
    probes:
      startup:
        enabled: true
        type: http
        path: /actuator/health/liveness
        port: 9086
        periodSeconds: 5
        failureThreshold: 30
      liveness:
        enabled: true
        type: http
        path: /actuator/health/liveness
        port: 9086
      readiness:
        enabled: true
        type: http
        path: /actuator/health
        port: 9086
    env:
      KAFKA_BOOTSTRAP_SERVERS: '{{ .Values.dependencies.kafka.bootstrapServers }}'
    resources:
      requests:
        cpu: 150m
        memory: 256Mi
      limits:
        cpu: 750m
        memory: 768Mi

  network-scanner:
    enabled: true
    kafka: true
    replicas: 1
    image:
      repository: ghcr.io/maccedofilho/virtualrift-network-scanner
      tag: edge
      pullPolicy: Always
    service:
      port: 8087
      targetPort: 8087
    ingress:
      enabled: false
    autoscaling:
      enabled: true
      minReplicas: 1
      maxReplicas: 4
      targetCPUUtilizationPercentage: 70
    podDisruptionBudget:
      enabled: false
    probes:
      startup:
        enabled: true
        type: http
        path: /actuator/health/liveness
        port: 9087
        periodSeconds: 5
        failureThreshold: 30
      liveness:
        enabled: true
        type: http
        path: /actuator/health/liveness
        port: 9087
      readiness:
        enabled: true
        type: http
        path: /actuator/health
        port: 9087
    env:
      KAFKA_BOOTSTRAP_SERVERS: '{{ .Values.dependencies.kafka.bootstrapServers }}'
    resources:
      requests:
        cpu: 150m
        memory: 256Mi
      limits:
        cpu: 750m
        memory: 768Mi

  sast:
    enabled: true
    kafka: true
    replicas: 1
    image:
      repository: ghcr.io/maccedofilho/virtualrift-sast
      tag: edge
      pullPolicy: Always
    service:
      port: 8088
      targetPort: 8088
    ingress:
      enabled: false
    autoscaling:
      enabled: true
      minReplicas: 1
      maxReplicas: 4
      targetCPUUtilizationPercentage: 70
    podDisruptionBudget:
      enabled: false
    probes:
      startup:
        enabled: true
        type: http
        path: /actuator/health/liveness
        port: 9088
        periodSeconds: 5
        failureThreshold: 30
      liveness:
        enabled: true
        type: http
        path: /actuator/health/liveness
        port: 9088
      readiness:
        enabled: true
        type: http
        path: /actuator/health
        port: 9088
    env:
      KAFKA_BOOTSTRAP_SERVERS: '{{ .Values.dependencies.kafka.bootstrapServers }}'
      SAST_WORKSPACE_ROOT: /tmp/virtualrift-sast
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: "2"
        memory: 2Gi

  frontend:
    enabled: true
    replicas: 2
    image:
      repository: ghcr.io/maccedofilho/virtualrift-frontend
      tag: edge
      pullPolicy: Always
    service:
      port: 8080
      targetPort: 8080
    ingress:
      enabled: true
      host: app.virtualrift.example.com
      path: /
      pathType: Prefix
      tls: true
      tlsSecretName: virtualrift-app-tls
      annotations: {}
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 5
      targetCPUUtilizationPercentage: 70
    podDisruptionBudget:
      enabled: true
      minAvailable: 1
    probes:
      startup:
        enabled: true
        type: http
        path: /healthz
        port: 8080
        periodSeconds: 3
        failureThreshold: 20
      liveness:
        enabled: true
        type: http
        path: /healthz
        port: 8080
      readiness:
        enabled: true
        type: http
        path: /healthz
        port: 8080
    env:
      VITE_VIRTUALRIFT_ENVIRONMENT: '{{ .Values.global.env.VIRTUALRIFT_RUNTIME_ENVIRONMENT }}'
      VITE_API_BASE_URL: '{{ .Values.platform.publicApiUrl }}'
      VITE_GITHUB_OAUTH_START_URL: '{{ if eq .Values.platform.githubOauthEnabled "true" }}{{ .Values.platform.publicApiUrl }}/api/v1/auth/oauth/github/start?redirect_uri={callbackUrl}{{ end }}'
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
