{{- range $name, $component := .Values.components }}
{{- if $component.enabled }}
{{- $globalEnv := default (dict) $.Values.global.env }}
{{- $componentEnv := default (dict) $component.env }}
{{- $env := mergeOverwrite (deepCopy $globalEnv) $componentEnv }}
{{- $globalSecurityContext := default (dict) $.Values.global.containerSecurityContext }}
{{- $componentSecurityContext := default (dict) $component.containerSecurityContext }}
{{- $containerSecurityContext := mergeOverwrite (deepCopy $globalSecurityContext) $componentSecurityContext }}
{{- $metricsPort := get $.Values.observability.metrics.ports $name }}
{{- $metricsEnabled := and $.Values.observability.metrics.enabled $metricsPort }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "virtualrift.componentFullname" (dict "root" $ "name" $name) }}
  labels:
    {{- include "virtualrift.commonLabels" (dict "root" $ "name" $name) | nindent 4 }}
    {{- if $metricsEnabled }}
    observability.virtualrift.io/scrape: "true"
    {{- end }}
  {{- if $metricsEnabled }}
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: {{ $.Values.observability.metrics.path | quote }}
    prometheus.io/port: {{ $metricsPort | quote }}
  {{- end }}
spec:
  type: {{ default $.Values.global.service.type $component.service.type }}
  selector:
    {{- include "virtualrift.selectorLabels" (dict "root" $ "name" $name) | nindent 4 }}
  ports:
    - name: http
      port: {{ $component.service.port }}
      targetPort: {{ default $component.service.port $component.service.targetPort }}
    {{- if $metricsEnabled }}
    - name: metrics
      port: {{ $metricsPort }}
      targetPort: {{ $metricsPort }}
    {{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "virtualrift.componentFullname" (dict "root" $ "name" $name) }}
  labels:
    {{- include "virtualrift.commonLabels" (dict "root" $ "name" $name) | nindent 4 }}
spec:
  {{- if not $component.autoscaling.enabled }}
  replicas: {{ default 1 $component.replicas }}
  {{- end }}
  revisionHistoryLimit: {{ default 3 $component.revisionHistoryLimit }}
  minReadySeconds: {{ default 10 $.Values.global.deployment.minReadySeconds }}
  progressDeadlineSeconds: {{ default 600 $.Values.global.deployment.progressDeadlineSeconds }}
  strategy:
    {{- toYaml $.Values.global.deployment.strategy | nindent 4 }}
  selector:
    matchLabels:
      {{- include "virtualrift.selectorLabels" (dict "root" $ "name" $name) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "virtualrift.commonLabels" (dict "root" $ "name" $name) | nindent 8 }}
        {{- if $metricsEnabled }}
        observability.virtualrift.io/scrape: "true"
        {{- end }}
        {{- with $.Values.global.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with $component.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- if or $.Values.global.podAnnotations $component.podAnnotations }}
      annotations:
        {{- with $.Values.global.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with $component.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "virtualrift.serviceAccountName" $ }}
      automountServiceAccountToken: {{ $.Values.global.automountServiceAccountToken }}
      enableServiceLinks: {{ $.Values.global.enableServiceLinks }}
      terminationGracePeriodSeconds: {{ $.Values.global.terminationGracePeriodSeconds }}
      {{- with $.Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- range . }}
        - name: {{ . | quote }}
        {{- end }}
      {{- end }}
      {{- with $.Values.global.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $.Values.global.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $.Values.global.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $.Values.global.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if $.Values.global.topologySpread.enabled }}
      topologySpreadConstraints:
        - maxSkew: {{ $.Values.global.topologySpread.maxSkew }}
          topologyKey: {{ $.Values.global.topologySpread.topologyKey | quote }}
          whenUnsatisfiable: {{ $.Values.global.topologySpread.whenUnsatisfiable }}
          labelSelector:
            matchLabels:
              {{- include "virtualrift.selectorLabels" (dict "root" $ "name" $name) | nindent 14 }}
      {{- end }}
      containers:
        - name: {{ $name }}
          image: {{ printf "%s:%s" $component.image.repository $component.image.tag | quote }}
          imagePullPolicy: {{ default "IfNotPresent" $component.image.pullPolicy }}
          {{- with $component.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $component.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ default $component.service.port $component.containerPort }}
            {{- if $metricsEnabled }}
            - name: metrics
              containerPort: {{ $metricsPort }}
            {{- end }}
          {{- if or (gt (len $env) 0) $component.secretEnv }}
          env:
            {{- include "virtualrift.renderEnv" (dict "root" $ "env" $env "secretEnv" $component.secretEnv) | nindent 12 }}
          {{- end }}
          {{- if and $component.envFrom (or $component.envFrom.configMaps $component.envFrom.secrets) }}
          envFrom:
            {{- include "virtualrift.renderEnvFrom" (dict "root" $ "envFrom" $component.envFrom) | nindent 12 }}
          {{- end }}
          {{- with $component.probes.startup }}
          {{- if .enabled }}
          startupProbe:
            {{- include "virtualrift.renderProbe" . | nindent 12 }}
          {{- end }}
          {{- end }}
          {{- with $component.probes.liveness }}
          {{- if .enabled }}
          livenessProbe:
            {{- include "virtualrift.renderProbe" . | nindent 12 }}
          {{- end }}
          {{- end }}
          {{- with $component.probes.readiness }}
          {{- if .enabled }}
          readinessProbe:
            {{- include "virtualrift.renderProbe" . | nindent 12 }}
          {{- end }}
          {{- end }}
          {{- if gt (int $.Values.global.preStopDelaySeconds) 0 }}
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - {{ printf "sleep %d" (int $.Values.global.preStopDelaySeconds) | quote }}
          {{- end }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          securityContext:
            {{- toYaml $containerSecurityContext | nindent 12 }}
          resources:
            {{- toYaml $component.resources | nindent 12 }}
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: {{ $.Values.global.tmpVolume.sizeLimit }}
{{- end }}
{{- end }}
