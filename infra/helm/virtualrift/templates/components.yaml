{{- range $name, $component := .Values.components }}
{{- if $component.enabled }}
{{- $globalEnv := default (dict) $.Values.global.env }}
{{- $componentEnv := default (dict) $component.env }}
{{- $env := mergeOverwrite (deepCopy $globalEnv) $componentEnv }}
{{- $secretEnv := deepCopy (default (dict) $component.secretEnv) }}
{{- $migration := default (dict) $component.migration }}
{{- if $migration.enabled }}
{{- $_ := set $env "SPRING_FLYWAY_ENABLED" "false" }}
{{- end }}
{{- if and $component.kafka $.Values.dependencies.kafka.security.enabled }}
{{- $_ := set $env "KAFKA_SECURITY_PROTOCOL" $.Values.dependencies.kafka.security.protocol }}
{{- $_ := set $env "KAFKA_SASL_MECHANISM" $.Values.dependencies.kafka.security.saslMechanism }}
{{- $_ := set $env "KAFKA_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM" $.Values.dependencies.kafka.security.endpointIdentificationAlgorithm }}
{{- $_ := set $secretEnv "KAFKA_SASL_JAAS_CONFIG" (dict "secretName" $.Values.dependencies.kafka.security.secretName "key" $.Values.dependencies.kafka.security.jaasConfigKey) }}
{{- $_ := set $secretEnv "KAFKA_SSL_TRUSTSTORE_CERTIFICATES" (dict "secretName" $.Values.dependencies.kafka.security.secretName "key" $.Values.dependencies.kafka.security.caCertificatesKey) }}
{{- end }}
{{- $globalSecurityContext := default (dict) $.Values.global.containerSecurityContext }}
{{- $componentSecurityContext := default (dict) $component.containerSecurityContext }}
{{- $containerSecurityContext := mergeOverwrite (deepCopy $globalSecurityContext) $componentSecurityContext }}
{{- $metricsPort := get $.Values.observability.metrics.ports $name }}
{{- $metricsEnabled := and $.Values.observability.metrics.enabled $metricsPort }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "virtualrift.componentFullname" (dict "root" $ "name" $name) }}
  labels:
    {{- include "virtualrift.commonLabels" (dict "root" $ "name" $name) | nindent 4 }}
    {{- if $metricsEnabled }}
    observability.virtualrift.io/scrape: "true"
    {{- end }}
  {{- if $metricsEnabled }}
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: {{ $.Values.observability.metrics.path | quote }}
    prometheus.io/port: {{ $metricsPort | quote }}
  {{- end }}
spec:
  type: {{ default $.Values.global.service.type $component.service.type }}
  selector:
    {{- include "virtualrift.selectorLabels" (dict "root" $ "name" $name) | nindent 4 }}
  ports:
    - name: http
      port: {{ $component.service.port }}
      targetPort: {{ default $component.service.port $component.service.targetPort }}
    {{- if $metricsEnabled }}
    - name: metrics
      port: {{ $metricsPort }}
      targetPort: {{ $metricsPort }}
    {{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "virtualrift.componentFullname" (dict "root" $ "name" $name) }}
  labels:
    {{- include "virtualrift.commonLabels" (dict "root" $ "name" $name) | nindent 4 }}
spec:
  {{- if not $component.autoscaling.enabled }}
  replicas: {{ default 1 $component.replicas }}
  {{- end }}
  revisionHistoryLimit: {{ default 3 $component.revisionHistoryLimit }}
  minReadySeconds: {{ default 10 $.Values.global.deployment.minReadySeconds }}
  progressDeadlineSeconds: {{ default 600 $.Values.global.deployment.progressDeadlineSeconds }}
  strategy:
    {{- toYaml $.Values.global.deployment.strategy | nindent 4 }}
  selector:
    matchLabels:
      {{- include "virtualrift.selectorLabels" (dict "root" $ "name" $name) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "virtualrift.commonLabels" (dict "root" $ "name" $name) | nindent 8 }}
        {{- if $metricsEnabled }}
        observability.virtualrift.io/scrape: "true"
        {{- end }}
        {{- with $.Values.global.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with $component.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- if or $.Values.global.podAnnotations $component.podAnnotations }}
      annotations:
        {{- with $.Values.global.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with $component.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "virtualrift.serviceAccountName" $ }}
      automountServiceAccountToken: {{ $.Values.global.automountServiceAccountToken }}
      enableServiceLinks: {{ $.Values.global.enableServiceLinks }}
      terminationGracePeriodSeconds: {{ $.Values.global.terminationGracePeriodSeconds }}
      {{- with $.Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- range . }}
        - name: {{ . | quote }}
        {{- end }}
      {{- end }}
      {{- with $.Values.global.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $.Values.global.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $.Values.global.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $.Values.global.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if $.Values.global.topologySpread.enabled }}
      topologySpreadConstraints:
        - maxSkew: {{ $.Values.global.topologySpread.maxSkew }}
          topologyKey: {{ $.Values.global.topologySpread.topologyKey | quote }}
          whenUnsatisfiable: {{ $.Values.global.topologySpread.whenUnsatisfiable }}
          labelSelector:
            matchLabels:
              {{- include "virtualrift.selectorLabels" (dict "root" $ "name" $name) | nindent 14 }}
      {{- end }}
      {{- if $migration.enabled }}
      initContainers:
        - name: database-migration
          image: {{ printf "%s:%s" $component.image.repository $component.image.tag | quote }}
          imagePullPolicy: {{ default "IfNotPresent" $component.image.pullPolicy }}
          command:
            - java
          args:
            - -Dloader.main=com.virtualrift.common.migration.FlywayMigrationMain
            - -cp
            - /app/application.jar
            - org.springframework.boot.loader.launch.PropertiesLauncher
          env:
            - name: DB_URL
              value: {{ tpl (required (printf "components.%s.env.DB_URL is required when migration is enabled" $name) (get $env "DB_URL")) $ | quote }}
            - name: DB_MIGRATION_USER
              value: {{ required (printf "components.%s.migration.user is required" $name) $migration.user | quote }}
            - name: DB_RUNTIME_USER
              value: {{ required (printf "components.%s.env.DB_USER is required when migration is enabled" $name) (get $env "DB_USER") | quote }}
            - name: DB_MIGRATION_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ tpl (required (printf "components.%s.migration.password.secretName is required" $name) $migration.password.secretName) $ | quote }}
                  key: {{ required (printf "components.%s.migration.password.key is required" $name) $migration.password.key | quote }}
            - name: DB_MIGRATION_LOCATIONS
              value: {{ required (printf "components.%s.migration.locations is required" $name) $migration.locations | quote }}
            - name: DB_MIGRATION_TABLE
              value: {{ required (printf "components.%s.migration.table is required" $name) $migration.table | quote }}
            - name: DB_MIGRATION_CONNECT_RETRIES
              value: {{ default 60 $migration.connectRetries | quote }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          securityContext:
            {{- toYaml $containerSecurityContext | nindent 12 }}
          resources:
            {{- toYaml $.Values.global.databaseMigration.resources | nindent 12 }}
      {{- end }}
      containers:
        - name: {{ $name }}
          image: {{ printf "%s:%s" $component.image.repository $component.image.tag | quote }}
          imagePullPolicy: {{ default "IfNotPresent" $component.image.pullPolicy }}
          {{- with $component.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $component.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ default $component.service.port $component.containerPort }}
            {{- if $metricsEnabled }}
            - name: metrics
              containerPort: {{ $metricsPort }}
            {{- end }}
          {{- if or (gt (len $env) 0) (gt (len $secretEnv) 0) }}
          env:
            {{- include "virtualrift.renderEnv" (dict "root" $ "env" $env "secretEnv" $secretEnv) | nindent 12 }}
          {{- end }}
          {{- if and $component.envFrom (or $component.envFrom.configMaps $component.envFrom.secrets) }}
          envFrom:
            {{- include "virtualrift.renderEnvFrom" (dict "root" $ "envFrom" $component.envFrom) | nindent 12 }}
          {{- end }}
          {{- with $component.probes.startup }}
          {{- if .enabled }}
          startupProbe:
            {{- include "virtualrift.renderProbe" . | nindent 12 }}
          {{- end }}
          {{- end }}
          {{- with $component.probes.liveness }}
          {{- if .enabled }}
          livenessProbe:
            {{- include "virtualrift.renderProbe" . | nindent 12 }}
          {{- end }}
          {{- end }}
          {{- with $component.probes.readiness }}
          {{- if .enabled }}
          readinessProbe:
            {{- include "virtualrift.renderProbe" . | nindent 12 }}
          {{- end }}
          {{- end }}
          {{- if gt (int $.Values.global.preStopDelaySeconds) 0 }}
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - {{ printf "sleep %d" (int $.Values.global.preStopDelaySeconds) | quote }}
          {{- end }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          securityContext:
            {{- toYaml $containerSecurityContext | nindent 12 }}
          resources:
            {{- toYaml $component.resources | nindent 12 }}
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: {{ $.Values.global.tmpVolume.sizeLimit }}
{{- end }}
{{- end }}
