{{- if .Values.global.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "virtualrift.serviceAccountName" . }}
  labels:
    {{- include "virtualrift.commonLabels" (dict "root" . "name" "runtime") | nindent 4 }}
  {{- with .Values.global.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
