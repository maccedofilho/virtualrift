{{- if .Values.externalSecrets.enabled }}
{{- if .Values.externalSecrets.secretStore.create }}
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: {{ .Values.externalSecrets.secretStoreRef.name }}
  labels:
    {{- include "virtualrift.commonLabels" (dict "root" . "name" "secret-store") | nindent 4 }}
spec:
  provider:
    vault:
      server: {{ required "externalSecrets.secretStore.vault.server is required" .Values.externalSecrets.secretStore.vault.server | quote }}
      path: {{ required "externalSecrets.secretStore.vault.path is required" .Values.externalSecrets.secretStore.vault.path | quote }}
      version: {{ .Values.externalSecrets.secretStore.vault.version | quote }}
      {{- with .Values.externalSecrets.secretStore.vault.namespace }}
      namespace: {{ . | quote }}
      {{- end }}
      auth:
        kubernetes:
          mountPath: {{ required "externalSecrets.secretStore.vault.auth.mountPath is required" .Values.externalSecrets.secretStore.vault.auth.mountPath | quote }}
          role: {{ required "externalSecrets.secretStore.vault.auth.role is required" .Values.externalSecrets.secretStore.vault.auth.role | quote }}
          serviceAccountRef:
            name: {{ include "virtualrift.serviceAccountName" . }}
            {{- with .Values.externalSecrets.secretStore.vault.auth.audiences }}
            audiences:
              {{- toYaml . | nindent 14 }}
            {{- end }}
---
{{- end }}
{{- range $name, $secret := .Values.externalSecrets.secrets }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ printf "%s-secret-%s" $.Release.Name (kebabcase $name) | trunc 63 | trimSuffix "-" }}
  labels:
    {{- include "virtualrift.commonLabels" (dict "root" $ "name" (printf "secret-%s" (kebabcase $name))) | nindent 4 }}
spec:
  refreshInterval: {{ $.Values.externalSecrets.refreshInterval | quote }}
  secretStoreRef:
    kind: {{ $.Values.externalSecrets.secretStoreRef.kind }}
    name: {{ $.Values.externalSecrets.secretStoreRef.name }}
  target:
    name: {{ $secret.targetName }}
    creationPolicy: {{ $.Values.externalSecrets.target.creationPolicy }}
    deletionPolicy: {{ $.Values.externalSecrets.target.deletionPolicy }}
  dataFrom:
    - extract:
        key: {{ printf "%s/%s" (trimSuffix "/" $.Values.externalSecrets.remotePathPrefix) (trimPrefix "/" $secret.remoteKey) | quote }}
---
{{- end }}
{{- end }}
